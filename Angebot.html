<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Angebot - Auftritt Berlin</title>
    <style>
        :root { --beige: #fdfaf2; --braun: #5d4037; --gold: #d4bc8e; --text: #2c2c2c; --weiss: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background-color: var(--beige); color: var(--text); line-height: 1.6; }
        header { background-color: var(--weiss); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        .logo { font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; color: var(--braun); text-decoration: none; }
        nav ul { list-style: none; display: flex; }
        nav ul li { margin-left: 30px; position: relative; }
        nav a { text-decoration: none; color: var(--text); text-transform: uppercase; font-size: 0.9rem; }
        .dropdown-content { display: none; position: absolute; background-color: var(--weiss); min-width: 200px; top: 100%; left: 0; padding: 10px 0; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); }
        .dropdown:hover .dropdown-content { display: block; }
        .container { max-width: 1000px; margin: 50px auto; padding: 40px; background: var(--weiss); box-shadow: 5px 5px 0px var(--gold); }
        .split { display: flex; gap: 40px; margin-top: 30px; }
        .box { flex: 1; padding: 20px; border-top: 4px solid var(--braun); }
        footer { background-color: var(--braun); color: var(--weiss); padding: 40px; text-align: center; }
        .back-btn { display: inline-block; padding: 10px 20px; background: var(--gold); color: var(--braun); text-decoration: none; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

                    <li><a href="Angebot.html">Taschen</a></li>
                    <li><a href="Angebot.html">Accessoires</a></li>
                </ul>
            </li>
            <li><a href="ÜberUns.html">Über uns</a></li>
            <li><a href="Anfahrt.html">Anfahrt</a></li>
            <li><a href="Impressum.html">Impressum</a></li>
        </ul>
    </nav>
</header>
<div class="container">

</body>
</html>
